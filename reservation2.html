<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>もみほぐし一休 予約空き状況</title>

<!-- ホーム画面に追加したときにアプリらしく全画面表示するための設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="一休予約">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #f5f6f8;
  }
  iframe {
    width: 100%;
    height: 100vh;
    border: none;
    display: block;
  }
</style>
</head>
<body>
  <iframe
    id="statusFrame"
    src="https://script.google.com/macros/s/AKfycbxLAK79xWkER2EDjAXusO6L5NdiO7uPcW_z1mUZOpjIByWHuvA_u2fakx9dx7uXnpCYeg/exec"
    title="もみほぐし一休 予約空き状況"
  ></iframe>

  <script>
    // アプリが再びアクティブ（画面に表示された状態）になったら、
    // 予約状況を最新の状態に自動更新する
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "visible") {
        var frame = document.getElementById("statusFrame");
        var baseUrl = "https://script.google.com/macros/s/AKfycbxLAK79xWkER2EDjAXusO6L5NdiO7uPcW_z1mUZOpjIByWHuvA_u2fakx9dx7uXnpCYeg/exec";
        // キャッシュを避けるため毎回タイムスタンプ付きで再読み込み
        frame.src = baseUrl + "?t=" + new Date().getTime();
      }
    });
  </script>
</body>
</html>
